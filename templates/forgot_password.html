<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MedTrack · Forgot Password</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f4f9ff 0%, #eaf2fd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Main Container */
        .forgot-password-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.25);
            overflow: hidden;
            position: relative;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header with gradient */
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            padding: 2.5rem 2rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .back-link {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 10;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }

        .header-content {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        .lock-icon {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .lock-icon i {
            font-size: 2rem;
            color: white;
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
        }

        /* Form Container */
        .form-container {
            padding: 2.5rem 2rem;
            background: white;
        }

        /* Steps Indicator */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #e2e8f0;
            transform: translateY(-50%);
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            background: white;
            padding: 0 0.5rem;
            text-align: center;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f1f5f9;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin: 0 auto 0.5rem;
            border: 2px solid #e2e8f0;
            transition: all 0.3s;
        }

        .step.active .step-number {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            border-color: transparent;
        }

        .step.completed .step-number {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-color: transparent;
        }

        .step-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
        }

        .step.active .step-label {
            color: #2563eb;
        }

        /* Form Steps */
        .form-step {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .form-label i {
            color: #2563eb;
            margin-right: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: white;
        }

        /* OTP Input Group */
        .otp-group {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .otp-input {
            width: 55px;
            height: 65px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .otp-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: white;
        }

        .timer-text {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .timer-text span {
            color: #2563eb;
            font-weight: 700;
        }

        .resend-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-link.disabled {
            color: #94a3b8;
            pointer-events: none;
        }

        /* Password Requirements */
        .password-requirements {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .requirement:last-child {
            margin-bottom: 0;
        }

        .requirement i {
            font-size: 0.8rem;
        }

        .requirement.valid {
            color: #10b981;
        }

        .requirement.valid i {
            color: #10b981;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            border: none;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px -6px #2563eb;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1e4f9c, #4338ca);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -8px #1e3f8a;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Success Message */
        .success-message {
            text-align: center;
            padding: 2rem 0;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .success-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .success-message h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .success-message p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header {
                padding: 2rem 1.5rem 1.5rem;
            }

            .form-container {
                padding: 2rem 1.5rem;
            }

            .otp-group {
                gap: 0.5rem;
            }

            .otp-input {
                width: 45px;
                height: 55px;
                font-size: 1.5rem;
            }

            .step-label {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <!-- Header -->
        <div class="header">
            <a href="#" onclick="goBack()" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
            <div class="header-content">
                <div class="lock-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Forgot Password?</h1>
                <p>Reset your password in three simple steps</p>
            </div>
        </div>

        <!-- Form Container -->
        <div class="form-container">
            <!-- Steps Indicator -->
            <div class="steps">
                <div class="step active" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">Email</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">OTP</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">Reset</div>
                </div>
            </div>

            <!-- Step 1: Email Form -->
            <div class="form-step active" id="step1Form">
                <form id="emailForm" onsubmit="sendOTP(event)">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" class="form-control" id="email" placeholder="Enter your registered email" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-paper-plane"></i> Send OTP
                    </button>
                </form>
            </div>

            <!-- Step 2: OTP Verification Form -->
            <div class="form-step" id="step2Form">
                <form id="otpForm" onsubmit="verifyOTP(event)">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-key"></i> Enter OTP
                        </label>
                        <div class="otp-group">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" onkeyup="moveToNext(this, 1)" onkeypress="return isNumberKey(event)" id="otp1">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" onkeyup="moveToNext(this, 2)" onkeypress="return isNumberKey(event)" id="otp2">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" onkeyup="moveToNext(this, 3)" onkeypress="return isNumberKey(event)" id="otp3">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" onkeyup="moveToNext(this, 4)" onkeypress="return isNumberKey(event)" id="otp4">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" onkeyup="moveToNext(this, 5)" onkeypress="return isNumberKey(event)" id="otp5">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" onkeyup="moveToNext(this, 6)" onkeypress="return isNumberKey(event)" id="otp6">
                        </div>
                    </div>
                    <div class="timer-text" id="timer">
                        OTP expires in <span id="time">02:00</span>
                    </div>
                    <div style="text-align: center; margin-bottom: 1.5rem;">
                        <span style="color: #64748b;">Didn't receive OTP? </span>
                        <a href="#" class="resend-link" id="resendLink" onclick="resendOTP()">Resend</a>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-check-circle"></i> Verify OTP
                    </button>
                </form>
            </div>

            <!-- Step 3: Reset Password Form -->
            <div class="form-step" id="step3Form">
                <form id="resetForm" onsubmit="resetPassword(event)">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-lock"></i> New Password
                        </label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" onkeyup="checkPasswordStrength()" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required>
                        </div>
                    </div>

                    <!-- Password Requirements -->
                    <div class="password-requirements">
                        <div class="requirement" id="req1">
                            <i class="fas fa-circle"></i> At least 8 characters
                        </div>
                        <div class="requirement" id="req2">
                            <i class="fas fa-circle"></i> At least 1 uppercase letter
                        </div>
                        <div class="requirement" id="req3">
                            <i class="fas fa-circle"></i> At least 1 number
                        </div>
                        <div class="requirement" id="req4">
                            <i class="fas fa-circle"></i> Passwords match
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Reset Password
                    </button>
                </form>
            </div>

            <!-- Success Message (hidden by default) -->
            <div class="success-message" id="successMessage" style="display: none;">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h2>Password Reset!</h2>
                <p>Your password has been successfully reset.</p>
                <button class="btn-primary" onclick="goToLogin()">
                    <i class="fas fa-sign-in-alt"></i> Login Now
                </button>
            </div>
        </div>
    </div>

    <script>
    // ==================== CSRF TOKEN HELPER ====================
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Global variables
    let userEmail = '';
    let timerInterval;

    // ==================== STEP NAVIGATION ====================
    function goToStep(step) {
        document.getElementById('step1').classList.remove('active', 'completed');
        document.getElementById('step2').classList.remove('active', 'completed');
        document.getElementById('step3').classList.remove('active', 'completed');

        document.getElementById('step1Form').classList.remove('active');
        document.getElementById('step2Form').classList.remove('active');
        document.getElementById('step3Form').classList.remove('active');

        if (step === 1) {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step1Form').classList.add('active');
        } else if (step === 2) {
            document.getElementById('step1').classList.add('completed');
            document.getElementById('step2').classList.add('active');
            document.getElementById('step2Form').classList.add('active');
        } else if (step === 3) {
            document.getElementById('step1').classList.add('completed');
            document.getElementById('step2').classList.add('completed');
            document.getElementById('step3').classList.add('active');
            document.getElementById('step3Form').classList.add('active');
        }
    }

    // ==================== TIMER ====================
    function startTimer(seconds) {
        const timerDisplay = document.getElementById('time');
        const resendLink = document.getElementById('resendLink');
        resendLink.classList.add('disabled');
        clearInterval(timerInterval);

        timerInterval = setInterval(() => {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
            if (seconds <= 0) {
                clearInterval(timerInterval);
                timerDisplay.textContent = '00:00';
                resendLink.classList.remove('disabled');
            }
            seconds--;
        }, 1000);
    }

    // ==================== OTP INPUT HANDLING ====================
    function moveToNext(current, nextField) {
        if (current.value.length === 1) {
            const next = document.getElementById(`otp${nextField + 1}`);
            if (next) next.focus();
        }
    }

    function isNumberKey(evt) {
        const charCode = (evt.which) ? evt.which : evt.keyCode;
        if (charCode > 31 && (charCode < 48 || charCode > 57)) return false;
        return true;
    }

    // ==================== PASSWORD STRENGTH ====================
    function checkPasswordStrength() {
        const password = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        const req1 = password.length >= 8;
        document.getElementById('req1').innerHTML = `<i class="fas fa-${req1 ? 'check-circle' : 'circle'}"></i> At least 8 characters`;
        document.getElementById('req1').className = req1 ? 'requirement valid' : 'requirement';

        const req2 = /[A-Z]/.test(password);
        document.getElementById('req2').innerHTML = `<i class="fas fa-${req2 ? 'check-circle' : 'circle'}"></i> At least 1 uppercase letter`;
        document.getElementById('req2').className = req2 ? 'requirement valid' : 'requirement';

        const req3 = /[0-9]/.test(password);
        document.getElementById('req3').innerHTML = `<i class="fas fa-${req3 ? 'check-circle' : 'circle'}"></i> At least 1 number`;
        document.getElementById('req3').className = req3 ? 'requirement valid' : 'requirement';

        const req4 = password === confirmPassword && password.length > 0;
        document.getElementById('req4').innerHTML = `<i class="fas fa-${req4 ? 'check-circle' : 'circle'}"></i> Passwords match`;
        document.getElementById('req4').className = req4 ? 'requirement valid' : 'requirement';
    }

    function checkPasswordRequirements() {
        const password = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        return password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password) && password === confirmPassword;
    }

    // ==================== API CALLS (UPDATED) ====================
    async function sendOTP(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        if (!email) return alert('Please enter your email');

        try {
            const response = await fetch('/api/send-otp/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ email })
            });
            const data = await response.json();
            if (response.ok) {
                userEmail = email;
                alert(data.message);
                goToStep(2);
                startTimer(120);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            alert('Network error: ' + error.message);
        }
    }

    async function verifyOTP(event) {
        event.preventDefault();
        const otp1 = document.getElementById('otp1').value;
        const otp2 = document.getElementById('otp2').value;
        const otp3 = document.getElementById('otp3').value;
        const otp4 = document.getElementById('otp4').value;
        const otp5 = document.getElementById('otp5').value;
        const otp6 = document.getElementById('otp6').value;
        const otp = otp1 + otp2 + otp3 + otp4 + otp5 + otp6;
        if (otp.length !== 6) return alert('Please enter the complete 6‑digit OTP');

        try {
            const response = await fetch('/api/verify-otp/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    email: userEmail,
                    otp1, otp2, otp3, otp4, otp5, otp6
                })
            });
            const data = await response.json();
            if (response.ok) {
                alert(data.message);
                clearInterval(timerInterval);
                goToStep(3);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            alert('Network error: ' + error.message);
        }
    }

    async function resetPassword(event) {
        event.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!checkPasswordRequirements()) {
            alert('Please meet all password requirements');
            return;
        }

        try {
            const response = await fetch('/api/reset-password/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ newPassword, confirmPassword })
            });
            const data = await response.json();
            if (response.ok) {
                // Hide forms, show success
                document.getElementById('step1Form').style.display = 'none';
                document.getElementById('step2Form').style.display = 'none';
                document.getElementById('step3Form').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.querySelector('.steps').style.display = 'none';
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            alert('Network error: ' + error.message);
        }
    }

    async function resendOTP() {
        const resendLink = document.getElementById('resendLink');
        if (resendLink.classList.contains('disabled')) return;

        try {
            const response = await fetch('/api/send-otp/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ email: userEmail })
            });
            const data = await response.json();
            if (response.ok) {
                alert('New OTP sent. Check your email.');
                // Clear OTP inputs
                for (let i = 1; i <= 6; i++) {
                    document.getElementById(`otp${i}`).value = '';
                }
                document.getElementById('otp1').focus();
                startTimer(120);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            alert('Network error: ' + error.message);
        }
